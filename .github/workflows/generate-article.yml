name: 記事自動生成

on:
  schedule:
    # 毎週月曜 10:00 JST (UTC 01:00)
    - cron: "0 1 * * 1"
  workflow_dispatch:
    # GitHub上から手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係インストール
        run: npm ci

      - name: 記事生成
        run: node scripts/generate-article.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.ts public/sitemap.xml
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "feat: 記事自動生成 $(date +%Y-%m-%d)" &&
            git push
          )
